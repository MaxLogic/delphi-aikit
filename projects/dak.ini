[ReportFilter]
; semicolon-separated file mask patterns applied to reported file paths (post-processing)
ExcludePathMasks=*\3rdParty\*;*\TMS-SmartSetUp\*;*\Statuspro\*;*\mecMeister\*;*\madCollection\*;*\Add-in Express\*

[PascalAnalyzer]
; Extra PALCMD args appended verbatim
; PAL suppressions are applied inline via //PALOFF (per Peganza); no PAL ignore list is supported here.
Args=/F=X /Q /A+ /FA /X="F:\projects\3rdParty<+>;F:\TMS-SmartSetUp<+>;F:\projects\Statuspro<+>;F:\projects\mecMeister<+>;C:\Program Files (x86)\madCollection<+>;C:\Program Files (x86)\Add-in Express<+>"
