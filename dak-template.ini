; Copy this file to `dak.ini` for machine-local overrides.
; The repo-root `dak.ini` is intentionally untracked and may contain absolute paths.

[FixInsightCL]
; Path to FixInsightCL.exe or its containing folder.
Path=
; Optional output root for FixInsight reports.
Output=
; Optional semicolon-separated FixInsight rule IDs to ignore.
Ignore=
; Optional path to a FixInsight settings file.
Settings=
Silent=false
Xml=false
Csv=false

[FixInsightIgnore]
; Semicolon-separated FixInsight rule IDs to suppress in report post-processing.
Warnings=

[ReportFilter]
; Semicolon-separated Windows-style file mask patterns for report post-processing.
ExcludePathMasks=

[PascalAnalyzer]
; Path to PALCMD.EXE / PALCMD32.EXE or its containing folder.
Path=
; Optional report root folder passed as /R=...
Output=
; Optional extra PALCMD args passed verbatim.
Args=

[MadExcept]
; Path to madExceptPatch.exe or its containing folder.
Path=

[Build]
; Optional default Delphi version used when --delphi is omitted.
DelphiVersion=

[Diagnostics]
; Bounded source snippets for build/dfm-check failures.
; SourceContext = auto | off | on
; SourceContextLines = lines shown before/after the hit.
SourceContext=auto
SourceContextLines=2

[WebCore]
; Path to TMSWebCompiler.exe.
CompilerPath=
