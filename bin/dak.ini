[FixInsightCL]
Output=
Ignore=
Settings=
Silent=false
Xml=false
Csv=false

[FixInsightIgnore]
; semicolon-separated FixInsight rule IDs to suppress in report post-processing (e.g. W502;C101;O801)
Warnings=

[ReportFilter]
; semicolon-separated file mask patterns applied to reported file paths (post-processing)
ExcludePathMasks=

[BuildIgnore]
; semicolon-separated compiler warning codes to suppress in build output (e.g. W1000;W1010)
Warnings=
; semicolon-separated compiler hint codes to suppress in build output (e.g. H2077;H2219)
Hints=
; semicolon-separated file mask patterns to suppress warnings/hints by file path (relative to repo/VCS root)
ExcludePathMasks=

[PascalAnalyzer]
; Path to PALCMD.EXE / PALCMD32.EXE (or its folder)
Path=
; Report root folder (PALCMD /R=...)
Output=
; Extra PALCMD args appended verbatim
Args=

[MadExcept]
; Path to madExceptPatch.exe (or its folder). Optional.
; If empty, build-delphi.bat tries PATH and common madExcept install folders.
Path=

[Build]
; Optional default Delphi version used when command line omits --delphi (for example: dfm-check)
DelphiVersion=

[Diagnostics]
; Semicolon-separated list of macro names to ignore when reporting "unknown macro" warnings.
; Use "*" to ignore all unknown macros.
IgnoreUnknownMacros=
; Semicolon-separated path masks to ignore when reporting "missing directory" warnings.
; Masks support "*" and "?" wildcards. Slashes are normalized.
IgnoreMissingPaths=
