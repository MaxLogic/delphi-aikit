[FixInsightCL]
Output=
Ignore=
Settings=
Silent=false
Xml=false
Csv=false

[FixInsightIgnore]
; semicolon-separated FixInsight rule IDs to suppress in report post-processing (e.g. W502;C101;O801)
Warnings=

[ReportFilter]
; semicolon-separated file mask patterns applied to reported file paths (post-processing)
ExcludePathMasks=

[PascalAnalyzer]
; Path to PALCMD.EXE / PALCMD32.EXE (or its folder)
Path=
; Report root folder (PALCMD /R=...)
Output=
; Extra PALCMD args appended verbatim
Args=

[Diagnostics]
; Semicolon-separated list of macro names to ignore when reporting "unknown macro" warnings.
; Use "*" to ignore all unknown macros.
IgnoreUnknownMacros=
; Semicolon-separated path masks to ignore when reporting "missing directory" warnings.
; Masks support "*" and "?" wildcards. Slashes are normalized.
IgnoreMissingPaths=
